<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShellKoin 7x7 - Mobile Edition</title>
    <style>
        :root {
            --board-bg: #6b3a1f; --board-border: #3d1f08; --cell-white: #fdf8f0; --cell-yellow: #fef3c7;
            --cell-orange: #fed7aa; --cell-safe: #bbf7d0; --cell-center: #fbbf24; --red: #ef4444;
            --blue: #3b82f6; --gold: #f59e0b; --text-light: #fef3e2; --text-muted: #c9a87c;
            --cell-size: calc((100vw - 16px) / 7); /* Edge-to-edge calculation */
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Arial', sans-serif; 
            background: #0a0502; 
            color: var(--text-light); 
            user-select: none; 
            overflow: hidden; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
        }

        .game-wrap { 
            display: flex; 
            flex-direction: column; 
            width: 100vw; 
            height: 100dvh; 
            justify-content: space-between; 
            align-items: center;
        }

        /* ===== PLAYER PANELS ===== */
        .player-panel {
            display: flex;
            flex-direction: column;
            width: 100vw;
            background: rgba(10,5,2, 0.95);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        /* BLUE PANEL (TOP) */
        .blue-panel {
            padding: 15px 15px 5px 15px; 
            border-bottom: 2px solid transparent;
            border-radius: 0 0 20px 20px;
        }
        .blue-panel.active { border-bottom-color: var(--blue); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.15); }
        
        /* RED PANEL (BOTTOM) */
        .red-panel {
            padding: 5px 15px 15px 15px;
            border-top: 2px solid transparent;
            border-radius: 20px 20px 0 0;
        }
        .red-panel.active { border-top-color: var(--red); box-shadow: 0 -10px 20px rgba(239, 68, 68, 0.15); }
        .player-panel:not(.active) { opacity: 0.5; }

        .stats-row { display: flex; justify-content: space-between; align-items: center; width: 100%; font-size: 11px; padding: 0 5px; color: var(--text-muted); }
        .stats-group { display: flex; align-items: center; gap: 8px; }
        
        .main-row { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 8px 0; }

        .turn-badge { display: flex; align-items: center; gap: 6px; }
        .turn-dot { width: 10px; height: 10px; border-radius: 50%; }
        .turn-dot.red { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .turn-dot.blue { background: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .turn-dot.dim { background: #555; }
        .turn-label { font-size: 12px; font-weight: 700; }
        .turn-label.red { color: #f87171; }
        .turn-label.blue { color: #60a5fa; }
        .turn-label.dim { color: #777; }

        .vault-stat span { font-weight: 700; color: var(--text-light); }
        .strikes-row { display: flex; align-items: center; gap: 2px;}
        .strike-icon.used { color: #ef4444; }

        /* OUTSIDE COINS (REDUCED SIZE) */
        .vault-tokens { display: flex; gap: 4px; align-items: center; width: 120px; }
        .vault-tokens .token { width: 28px; height: 28px; font-size: 10px; border-width: 1.5px; }

        /* NUMBER DISPLAY BOX */
        .roll-result-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: var(--text-muted);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            transition: all 0.2s ease-in-out;
            flex-shrink: 0;
        }
        .roll-result-box.p1-glow {
            color: #f87171;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4), inset 0 0 10px rgba(239, 68, 68, 0.2);
            transform: scale(1.05);
        }
        .roll-result-box.p2-glow {
            color: #60a5fa;
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(59, 130, 246, 0.2);
            transform: scale(1.05);
        }

        /* CIRCULAR TIMER & ROLL */
        .roll-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 75px; }
        
        .circ-timer { 
            width: 66px; height: 66px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            background: rgba(255,255,255,0.08); 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: background 0.1s linear;
        }
        
        .roll-btn-circ { 
            width: 56px; height: 56px; border-radius: 50%; border: none; 
            background: linear-gradient(135deg, #fbbf24, #d97706); 
            color: #1c0a00; font-size: 26px; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center;
            outline: none; z-index: 5;
        }
        .roll-btn-circ:active:not(:disabled) { transform: scale(0.92); }
        .roll-btn-circ:disabled { background: #3d2a15; color: #6b4c2a; box-shadow: none; }

        /* TINY SHELLS UNDER ROLL BUTTON */
        .shells-row { display: flex; gap: 3px; margin-top: 5px; }
        .shell-el { width: 14px; height: 10px; border-radius: 4px; border: 1px solid #8b6340; display: flex; align-items: center; justify-content: center; font-size: 6px; background: #fef9f0; transition: all 0.2s; }
        .shell-el.down { background: #a07850; color: #fef9f0; transform: rotateX(180deg); font-size: 5px; }

        /* PREDICTION BAR IN BLUE PANEL */
        .prediction-wrap { width: 100%; margin-top: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 6px; }
        .pred-title { font-size: 8px; color: var(--text-muted); text-align: center; margin-bottom: 4px; letter-spacing: 1px;}
        .meter-track { display: flex; height: 10px; border-radius: 5px; overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.1); }
        .meter-red { background: linear-gradient(90deg, #b91c1c, #ef4444); height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; transition: width 0.6s ease; }
        .meter-blue { background: linear-gradient(90deg, #3b82f6, #1d4ed8); height: 100%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; color: white; transition: width 0.6s ease; }

        /* ===== BOARD & CENTER PIECE ===== */
        .center-col { display: flex; justify-content: center; align-items: center; width: 100vw; flex: 1; }
        .board-wrap { width: 100vw; display: flex; justify-content: center; align-items: center; position: relative;}
        
        .board { 
            display: grid; 
            grid-template-columns: repeat(7, var(--cell-size)); 
            grid-template-rows: repeat(7, var(--cell-size)); 
            gap: 2px; 
            width: 100vw;
            height: 100vw;
            background: var(--board-bg); 
            padding: 2px; 
            border-top: 3px solid var(--board-border);
            border-bottom: 3px solid var(--board-border);
            position: relative; 
        }
        
        .cell { background: var(--cell-white); border-radius: 4px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(139,90,43,0.25); }
        .cell-yellow { background: var(--cell-yellow) !important; border-color: rgba(234,179,8,0.4) !important; }
        .cell-orange { background: var(--cell-orange) !important; border-color: rgba(234,88,12,0.4) !important; }
        .cell-safe { background: var(--cell-safe) !important; border: 1.5px dashed #16a34a !important; }
        .cell-safe::after { content: '✕'; position: absolute; font-size: 20px; color: rgba(22,163,74,0.12); pointer-events: none; font-weight: 900; }
        .cell-center { background: var(--cell-center) !important; border: 2px solid #d97706 !important; box-shadow: inset 0 0 12px rgba(245,158,11,0.3); }
        
        .arrow-up::before { content:'↑'; position:absolute; top:-12px; left:50%; transform:translateX(-50%); font-size:12px; color:#1d4ed8; font-weight:700; pointer-events:none; z-index:40; }
        .arrow-down::after { content:'↓'; position:absolute; bottom:-12px; left:50%; transform:translateX(-50%); font-size:12px; color:#b91c1c; font-weight:700; pointer-events:none; z-index:40; }
        
        /* BOARD TOKENS (KEEP REGULAR SIZE) */
        .token { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; position: relative; flex-shrink: 0; transition: transform 0.15s; }
        
        .p1-token { background: radial-gradient(circle at 35% 35%, #f87171, #b91c1c); box-shadow: 0 2px 6px rgba(185,28,28,0.6); }
        .p2-token { background: radial-gradient(circle at 35% 35%, #60a5fa, #1d4ed8); box-shadow: 0 2px 6px rgba(29,78,216,0.6); }
        
        .token.key-selected { outline: 3px solid #0ff; outline-offset: 2px; box-shadow: 0 0 15px #0ff !important; transform: scale(1.15); z-index: 50; border-color: #fff; }
        .token.glow-move { animation: token-pulse 0.7s infinite alternate; border-color: #0ff; }
        @keyframes token-pulse { 0% { box-shadow: 0 0 4px #0ff, 0 2px 6px rgba(0,0,0,0.4); transform: scale(1); } 100% { box-shadow: 0 0 16px #0ff, 0 0 28px rgba(0,255,255,0.6); transform: scale(1.12); } }
        
        .token.shielded { border: 2.5px solid #22d3ee !important; animation: shield-anim 1s infinite alternate; }
        @keyframes shield-anim { 0% { box-shadow: 0 0 8px #22d3ee; } 100% { box-shadow: 0 0 20px #22d3ee, 0 0 35px rgba(34,211,238,0.3); } }
        .token.danger { animation: danger-anim 0.45s infinite alternate !important; }
        @keyframes danger-anim { 0% { box-shadow: 0 0 4px #f97316; transform: scale(1); } 100% { box-shadow: 0 0 18px #ef4444, 0 0 8px #f97316; transform: scale(1.13); } }
        .token.stack-badge::after { content: attr(data-count); position: absolute; top: -4px; right: -4px; width: 14px; height: 14px; background: #fbbf24; color: #7c2d12; border-radius: 50%; font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 1.5px solid white; z-index: 30; }
        
        .portal-layer, .redhole-layer { position: absolute; inset: 0; border-radius: 4px; z-index: 15; pointer-events: none; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .portal-layer { background: #0f0f1a; animation: portal-blink 0.9s infinite alternate; }
        @keyframes portal-blink { 0% { background: #1a1a3e; box-shadow: inset 0 0 8px #6366f1; } 100% { background: #0a0a1f; box-shadow: inset 0 0 20px #4f46e5; } }
        .redhole-layer { background: #7f1d1d; animation: redhole-blink 0.6s infinite alternate; }
        @keyframes redhole-blink { 0% { background: #991b1b; box-shadow: inset 0 0 10px #7f1d1d; } 100% { background: #450a0a; box-shadow: inset 0 0 25px #dc2626; } }
        .crown-emoji { font-size: 24px; animation: crown-float 2s infinite alternate ease-in-out; position: absolute; z-index: 2; pointer-events: none; }
        @keyframes crown-float { 0% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 4px rgba(251,191,36,0.5)); } 100% { transform: translateY(-3px) scale(1.07); filter: drop-shadow(0 0 12px rgba(251,191,36,0.9)); } }
        
        /* Modal & Start Screens */
        #start-screen, #end-screen, #quit-modal { position: fixed; inset: 0; background: rgba(10, 5, 2, 0.95); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #end-screen, #quit-modal { display: none; }
        .start-title, .end-title { font-size: 45px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 30px rgba(245,158,11,0.6); margin-bottom: 10px; text-align: center; }
        .start-sub { font-size: 14px; color: var(--text-muted); letter-spacing: 4px; margin-bottom: 40px; text-align: center; }
        .start-btn, .restart-btn { padding: 16px 30px; font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #fbbf24, #d97706); border: none; border-radius: 50px; color: #1c0a00; cursor: pointer; box-shadow: 0 8px 20px rgba(245,158,11,0.5); margin-top: 20px;}
        .restart-btn { background: linear-gradient(135deg, #4ade80, #16a34a); color: white; box-shadow: 0 8px 20px rgba(22,163,74,0.5); }
        
        .quit-box { background: #2d1a0a; border: 2px solid var(--red); border-radius: 16px; padding: 20px; text-align: center; max-width: 90%; }
        .quit-box h2 { color: white; margin-bottom: 20px; font-size: 18px; }
        .quit-opts { display: flex; gap: 15px; justify-content: center; }
        .quit-yes, .quit-no { border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .quit-yes { background: #ef4444; color: white; }
        .quit-no { background: #4b5563; color: white; }

        /* Event Banner */
        .event-banner { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.7); background: #2d1a0a; border: 2px solid var(--gold); border-radius: 16px; padding: 16px 24px; font-size: 20px; font-weight: 800; color: var(--gold); text-align: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 50px rgba(245,158,11,0.5); width: 80%; }
        .event-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .event-banner .ev-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 4px; }
        
        .sparkle { position: absolute; width: 40px; height: 40px; border-radius: 50%; background: radial-gradient(circle, #fff 5%, #fbbf24 40%, transparent 70%); pointer-events: none; z-index: 100; animation: spark 0.5s ease-out forwards; }
        @keyframes spark { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        .confetti-piece { position: fixed; top: -12px; width: 8px; height: 10px; z-index: 999; animation: fall linear forwards; border-radius: 2px; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        
        .shake { animation: shake 0.3s ease; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-6px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(4px); } }
        .board-danger-flash { animation: board-flash-danger 0.5s ease-in-out 2; }
        @keyframes board-flash-danger { 0%,100% { border-color: var(--board-border); } 50% { border-color: #ef4444; box-shadow: 0 0 30px rgba(239,68,68,0.5); } }
        .board-win-flash { animation: board-flash-win 0.5s ease-in-out 3; }
        @keyframes board-flash-win { 0%,100% { border-color: var(--board-border); } 50% { border-color: #fbbf24; box-shadow: 0 0 40px rgba(251,191,36,0.6); } }
    </style>
</head>
<body>
    
    <!-- Quit Modal (Hidden by Default) -->
    <div id="quit-modal">
        <div class="quit-box">
            <h2>గేమ్ మధ్యలో ఆపేయాలనుకుంటున్నారా?</h2>
            <div class="quit-opts">
                <button class="quit-yes" onclick="confirmQuit()">Yes, Quit</button>
                <button class="quit-no" onclick="hideQuitModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Event Banner for Kills, Portals etc -->
    <div class="event-banner" id="ev-banner">
        <div id="ev-main"></div>
        <div class="ev-sub" id="ev-sub"></div>
    </div>

    <div id="start-screen">
        <h1 class="start-title">ShellKoin 7x7</h1>
        <p class="start-sub">MOBILE EDITION</p>
        <button class="start-btn" onclick="startGame()">▶ START GAME</button>
    </div>

    <div id="end-screen">
        <div class="end-title" id="end-msg">🏆 RED గెలిచారు!</div>
        <button class="restart-btn" onclick="hardResetGame()">🔄 RESTART GAME</button>
    </div>

    <div class="game-wrap">
        <!-- P2 CONTROLS (BLUE - TOP) -->
        <div class="player-panel blue-panel" id="p2-panel">
            <div class="stats-row">
                <div class="turn-badge">
                    <div class="turn-dot dim" id="p2-dot"></div>
                    <span class="turn-label dim" id="p2-label">BLUE వంతు</span>
                </div>
                <div class="stats-group">
                    <div class="vault-stat">కిల్స్: <span id="p2-kills">0</span></div> <span style="color:#555">|</span>
                    <div class="vault-stat">పర్మిషన్: <span id="p2-perm">❌</span></div> <span style="color:#555">|</span>
                    <div class="strikes-row"><div id="p2-strikes"></div></div>
                </div>
            </div>
            <div class="main-row">
                <!-- COINS (Left) -->
                <div class="vault-tokens" id="p2-vault-tokens"></div>
                
                <!-- NUMBER DISPLAY BOX (Center) -->
                <div class="roll-result-box" id="p2-roll-result">-</div>
                
                <!-- CIRCULAR TIMER & ROLL (Right) -->
                <div class="roll-wrap">
                    <div class="circ-timer" id="p2-circ-timer">
                        <button class="roll-btn-circ" id="p2-roll-btn" onclick="rollGavvalu(2)" disabled>🎲</button>
                    </div>
                    <div class="shells-row">
                        <div class="shell-el" id="p2-s0">🐚</div><div class="shell-el" id="p2-s1">🐚</div>
                        <div class="shell-el" id="p2-s2">🐚</div><div class="shell-el" id="p2-s3">🐚</div>
                    </div>
                </div>
            </div>
            <!-- PREDICTION METER UNDER BLUE COINS -->
            <div class="prediction-wrap">
                <div class="pred-title">గెలుపు అంచనా (PREDICTION)</div>
                <div class="meter-track">
                    <div class="meter-red" id="m-red" style="width:50%">50%</div>
                    <div class="meter-blue" id="m-blue" style="width:50%">50%</div>
                </div>
            </div>
        </div>

        <!-- BOARD (CENTER) -->
        <div class="center-col">
            <div class="board-wrap">
                <div class="board" id="game-board"></div>
            </div>
        </div>

        <!-- P1 CONTROLS (RED - BOTTOM) -->
        <div class="player-panel red-panel active" id="p1-panel">
            <div class="main-row">
                <!-- COINS (Left) -->
                <div class="vault-tokens" id="p1-vault-tokens"></div>
                
                <!-- NUMBER DISPLAY BOX (Center) -->
                <div class="roll-result-box" id="p1-roll-result">-</div>
                
                <!-- CIRCULAR TIMER & ROLL (Right) -->
                <div class="roll-wrap">
                    <div class="circ-timer" id="p1-circ-timer">
                        <button class="roll-btn-circ" id="p1-roll-btn" onclick="rollGavvalu(1)">🎲</button>
                    </div>
                    <div class="shells-row">
                        <div class="shell-el" id="p1-s0">🐚</div><div class="shell-el" id="p1-s1">🐚</div>
                        <div class="shell-el" id="p1-s2">🐚</div><div class="shell-el" id="p1-s3">🐚</div>
                    </div>
                </div>
            </div>
            
            <div class="stats-row">
                <div class="turn-badge">
                    <div class="turn-dot red" id="p1-dot"></div>
                    <span class="turn-label red" id="p1-label">RED వంతు</span>
                </div>
                <div class="stats-group">
                    <div class="vault-stat">కిల్స్: <span id="p1-kills">0</span></div> <span style="color:#555">|</span>
                    <div class="vault-stat">పర్మిషన్: <span id="p1-perm">❌</span></div> <span style="color:#555">|</span>
                    <div class="strikes-row"><div id="p1-strikes"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ===== WEB AUDIO API =====
        const SFX = {
          ctx: null,
          init() { if (!this.ctx) { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } if (this.ctx.state === 'suspended') this.ctx.resume(); },
          play(type) {
            try {
              this.init(); const t = this.ctx.currentTime; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
              if (type === 'roll') { [0, 0.05, 0.1, 0.15].forEach(delay => { const o = this.ctx.createOscillator(); const g = this.ctx.createGain(); o.type = 'square'; o.connect(g); g.connect(this.ctx.destination); o.frequency.setValueAtTime(800, t + delay); o.frequency.exponentialRampToValueAtTime(200, t + delay + 0.05); g.gain.setValueAtTime(0.1, t + delay); g.gain.linearRampToValueAtTime(0, t + delay + 0.05); o.start(t + delay); o.stop(t + delay + 0.05); }); }
              else if (type === 'move') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t + 0.1); gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.1); osc.start(t); osc.stop(t + 0.1); }
              else if (type === 'kill') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(20, t + 0.3); gain.gain.setValueAtTime(0.3, t); gain.gain.linearRampToValueAtTime(0, t + 0.3); osc.start(t); osc.stop(t + 0.3); }
              else if (type === 'portal') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, t); osc.frequency.linearRampToValueAtTime(1200, t + 0.4); gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.4); osc.start(t); osc.stop(t + 0.4); }
              else if (type === 'redhole' || type === 'timeout') { osc.type = 'square'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(100, t + 0.4); gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 0.4); osc.start(t); osc.stop(t + 0.4); }

          if (!p1at||!p2at) return;
          const shP=G.shielded.player, shI=G.shielded.idx; let shC=null;
          if (shP===1&&G.p1Tokens[shI]!==-1) shC=p1Path[G.p1Tokens[shI]]; if (shP===2&&G.p2Tokens[shI]!==-1) shC=p2Path[G.p2Tokens[shI]];
          const p1pts=G.p1Tokens.reduce((a,b)=>a+(b===-1?0:b),0)+(G.p1Kills*10), p2pts=G.p2Tokens.reduce((a,b)=>a+(b===-1?0:b),0)+(G.p2Kills*10);
          if (movingP===1) {
            if (shP===2&&shC===coord) { G.p1Tokens.forEach((p,i)=>{ if(p!==-1&&p1Path[p]===coord) G.p1Tokens[i]=0; }); SFX.play('kill'); showEvent('🛡️ రివర్స్ కిల్!'); shakeBoard(); }
            else if (p2at>=2) { G.p1Tokens.forEach((p,i)=>{ if(p!==-1&&p1Path[p]===coord) G.p1Tokens[i]=0; }); G.p2Kills++; if (p1pts<p2pts) G.p1Revenge=true; SFX.play('kill'); showEvent('💥 BLUE జంట!'); shakeBoard(); }
            else { let killed=false; G.p2Tokens.forEach((p,i)=>{ if(p!==-1&&p2Path[p]===coord) { if (p>=41&&p<=46) { G.p2Tokens[i]=0; showEvent('💥 కట్!','ఎక్స్‌ట్రా టర్న్'); } else { G.p2Tokens[i]=-1; showEvent('💥 కిల్!','లక్కీ బాక్స్'); } G.p1Kills++; G.p1BonusPending=true; G.extraTurn=true; killed=true; if (p2pts<p1pts) G.p2Revenge=true; }}); if (killed) { SFX.play('kill'); shakeBoard(); } }
          } else {
            if (shP===1&&shC===coord) { G.p2Tokens.forEach((p,i)=>{ if(p!==-1&&p2Path[p]===coord) G.p2Tokens[i]=0; }); SFX.play('kill'); showEvent('🛡️ రివర్స్ కిల్!'); shakeBoard(); }
            else if (p1at>=2) { G.p2Tokens.forEach((p,i)=>{ if(p!==-1&&p2Path[p]===coord) G.p2Tokens[i]=0; }); G.p1Kills++; if (p2pts<p1pts) G.p2Revenge=true; SFX.play('kill'); showEvent('💥 RED జంట!'); shakeBoard(); }
            else { let killed=false; G.p1Tokens.forEach((p,i)=>{ if(p!==-1&&p1Path[p]===coord) { if (p>=41&&p<=46) { G.p1Tokens[i]=0; showEvent('💥 కట్!','ఎక్స్‌ట్రా టర్న్'); } else { G.p1Tokens[i]=-1; showEvent('💥 కిల్!','లక్కీ బాక్స్'); } G.p2Kills++; G.p2BonusPending=true; G.extraTurn=true; killed=true; if (p1pts<p2pts) G.p1Revenge=true; }}); if (killed) { SFX.play('kill'); shakeBoard(); } }
          }
        }
        function validateShield() { const {player:p, idx:i} = G.shielded; if (p===null) return; const pos = p===1?G.p1Tokens[i]:G.p2Tokens[i]; if (pos<41||pos>46) G.shielded={player:null,idx:null}; }

        // ===== SWITCH TURN =====
        function switchTurn(noMove) { if (G.isGameOver) return; G.currentPlayer = G.currentPlayer===1?2:1; G.hasRolled = false; G.currentRoll = 0; saveState(); resetRoll(); }
        
        function resetRoll() {
          if (G.isGameOver || !G.gameStarted) return; 
          const p = G.currentPlayer;
          
          document.getElementById('p1-roll-btn').disabled = (p !== 1); 
          document.getElementById('p2-roll-btn').disabled = (p !== 2);
          
          document.getElementById('p1-dot').className = `turn-dot ${p===1?'red':'dim'}`;
          document.getElementById('p1-label').className = `turn-label ${p===1?'red':'dim'}`;
          document.getElementById('p2-dot').className = `turn-dot ${p===2?'blue':'dim'}`;
          document.getElementById('p2-label').className = `turn-label ${p===2?'blue':'dim'}`;

          document.getElementById('p1-panel').classList.toggle('active', p === 1);
          document.getElementById('p2-panel').classList.toggle('active', p === 2);

          // Reset previous player's result display cleanly to "-"
          const prevP = p === 1 ? 2 : 1;
          document.getElementById(`p${prevP}-roll-result`).className = 'roll-result-box';
          document.getElementById(`p${prevP}-roll-result`).textContent = "-";

          updateBoard(); 
          startTimer();
        }

        // ===== DRAW BOARD & METERS =====
        function updateBoard() {
          document.querySelectorAll('.board .token').forEach(t=>t.remove());
          const p = G.currentPlayer, r = G.currentRoll, mov = G.hasRolled ? getMovable(r) : [], movI = mov.map(m=>m.idx);
          const p1C={}, p2C={}; G.p1Tokens.forEach(pos=>{ if(pos!==-1) p1C[p1Path[pos]]=(p1C[p1Path[pos]]||0)+1; }); G.p2Tokens.forEach(pos=>{ if(pos!==-1) p2C[p2Path[pos]]=(p2C[p2Path[pos]]||0)+1; });
          const dC=new Set();
          G.p1Tokens.forEach(pos=>{ if(pos===-1||safeZones.includes(p1Path[pos])) return; const c=p1Path[pos], i=p2Path.indexOf(c); if(i===-1) return; if(G.p2Tokens.filter(p=>p!==-1&&p2Path[p]===c).length<2) G.p2Tokens.forEach(p2=>{ if(p2!==-1&&p2<i&&(i-p2)<=3) dC.add(c); }); });
          G.p2Tokens.forEach(pos=>{ if(pos===-1||safeZones.includes(p2Path[pos])) return; const c=p2Path[pos], i=p1Path.indexOf(c); if(i===-1) return; if(G.p1Tokens.filter(p=>p!==-1&&p1Path[p]===c).length<2) G.p1Tokens.forEach(p1=>{ if(p1!==-1&&p1<i&&(i-p1)<=3) dC.add(c); }); });

          G.p1Tokens.forEach((pos,idx)=>{
            if (pos===-1) return; const coord=p1Path[pos], cell=getCellEl(coord); if (!cell) return;
            const isF=G.p1Tokens.indexOf(pos)===idx, n=p1C[coord], tok=document.createElement('div');
            tok.className='token p1-token'; tok.dataset.player='1'; tok.dataset.idx=idx;
            if (p===1&&G.hasRolled&&movI.includes(idx) && !G.isGameOver) { tok.classList.add('glow-move'); }
            if (G.shielded.player===1&&G.shielded.idx===idx) tok.classList.add('shielded');
            if (dC.has(coord) && !G.isGameOver) tok.classList.add('danger');
            if (isF&&n>1) { tok.classList.add('stack-badge'); tok.dataset.count=n; } if (!isF) { tok.style.opacity='0.25'; tok.style.position='absolute'; }
            cell.appendChild(tok);
          });

          G.p2Tokens.forEach((pos,idx)=>{
            if (pos===-1) return; const coord=p2Path[pos], cell=getCellEl(coord); if (!cell) return;
            const isF=G.p2Tokens.indexOf(pos)===idx, n=p2C[coord], tok=document.createElement('div');
            tok.className='token p2-token'; tok.dataset.player='2'; tok.dataset.idx=idx;
            if (p===2&&G.hasRolled&&movI.includes(idx) && !G.isGameOver) { tok.classList.add('glow-move'); }
            if (G.shielded.player===2&&G.shielded.idx===idx) tok.classList.add('shielded');
            if (dC.has(coord) && !G.isGameOver) tok.classList.add('danger');
            if (isF&&n>1) { tok.classList.add('stack-badge'); tok.dataset.count=n; } if (!isF) { tok.style.opacity='0.25'; tok.style.position='absolute'; }
            cell.appendChild(tok);
          });

          if (!G.isGameOver) { document.querySelectorAll('.board .token').forEach(tok=>{ tok.addEventListener('click', e => moveToken(parseInt(tok.dataset.player), parseInt(tok.dataset.idx), e)); }); }
          const rV=document.getElementById('p1-vault-tokens'), bV=document.getElementById('p2-vault-tokens'); rV.innerHTML=''; bV.innerHTML='';

          G.p1Tokens.forEach((v,i)=>{ if(v!==-1)return;
            const m=(p===1&&G.hasRolled&&(r===6||r===12) && !G.isGameOver), t=document.createElement('div'); t.className='token p1-token'+(m?' movable-vault-token':'');
            if (m) { t.style.boxShadow='0 0 10px #4ade80, 0 2px 6px rgba(185,28,28,0.6)'; }
            if (!G.isGameOver) { t.onclick=(e)=>releaseFromVault(1,i,e); } rV.appendChild(t);
          });
          G.p2Tokens.forEach((v,i)=>{ if(v!==-1)return;
            const m=(p===2&&G.hasRolled&&(r===6||r===12) && !G.isGameOver), t=document.createElement('div'); t.className='token p2-token'+(m?' movable-vault-token':'');
            if (m) { t.style.boxShadow='0 0 10px #4ade80, 0 2px 6px rgba(29,78,216,0.6)'; }
            if (!G.isGameOver) { t.onclick=(e)=>releaseFromVault(2,i,e); } bV.appendChild(t);
          });

          document.getElementById('p1-kills').textContent=G.p1Kills; document.getElementById('p2-kills').textContent=G.p2Kills;
          document.getElementById('p1-perm').textContent=hasPerm(1)?'✅':'❌'; document.getElementById('p2-perm').textContent=hasPerm(2)?'✅':'❌';

          updateMeters(); checkWinner();
          curMovEls = Array.from(document.querySelectorAll('.glow-move, .movable-vault-token')); selMovIdx = curMovEls.length ? 0 : -1; if(selMovIdx>-1) updKeySel();
        }

        // PREDICTION LOGIC
        function updateMeters() {
            let p1pts = 0, p2pts = 0;
            G.p1Tokens.forEach(p => { if (p >= 41 && p < p1Path.length - 1) p1pts += p * 2; else if (p > -1) p1pts += p; });
            G.p2Tokens.forEach(p => { if (p >= 41 && p < p2Path.length - 1) p2pts += p * 2; else if (p > -1) p2pts += p; });
            
            if (p1pts > G.maxP1) G.maxP1 = p1pts; 
            if (p2pts > G.maxP2) G.maxP2 = p2pts;
            
            const tot = G.maxP1 + G.maxP2; 
            let rp = tot > 0 ? Math.round((G.maxP1 / tot) * 100) : 50; 
            rp = Math.max(5, Math.min(95, rp)); 
            const bp = 100 - rp;
            
            document.getElementById('m-red').style.width = rp + '%'; 
            document.getElementById('m-red').textContent = rp + '%';
            document.getElementById('m-blue').style.width = bp + '%'; 
            document.getElementById('m-blue').textContent = bp + '%';
        }

        function checkWinner() {
          if (G.p1Timeouts >= 4 || G.p2Timeouts >= 4) return;
          const p1win=G.p1Tokens.every(p=>p===p1Path.length-1), p2win=G.p2Tokens.every(p=>p===p2Path.length-1);
          if (!p1win&&!p2win) return;
          G.isGameOver=true; stopTimer(); document.getElementById('p1-roll-btn').disabled=true; document.getElementById('p2-roll-btn').disabled=true;
          
          const lbl = document.getElementById('p1-label'); const lbl2 = document.getElementById('p2-label');
          lbl.textContent = `${p1win?'RED':'BLUE'} విజేత! 👑`; lbl.style.color = '#fbbf24';
          lbl2.textContent = lbl.textContent; lbl2.style.color = '#fbbf24';
          
          SFX.play('win'); const winner=p1win?'🔴 RED':'🔵 BLUE';
          let p1Perm = hasPerm(1), p2Perm = hasPerm(2), winR = "అద్భుతం! అభినందనలు!";
          if (p1win && !p2Perm) winR = "BLUE కి లోపలికి పర్మిషన్ లేదు!"; if (p2win && !p1Perm) winR = "RED కి లోపలికి పర్మిషన్ లేదు!";
          showEvent(`🏆 ${winner} గెలిచారు!`, winR, 6000); flashBoard('board-win-flash'); triggerConfetti();
          
          clearState();
          setTimeout(() => { document.getElementById('end-msg').textContent = `🏆 ${winner} గెలిచారు!`; document.getElementById('end-screen').style.display = 'flex'; }, 3500);
        }

        // ===== GLOBAL KEYBOARD CONTROLS =====
        document.addEventListener('keydown', e => {
          if(G.isGameOver || !G.gameStarted) return; 
          
          if(e.code === 'Digit5' || e.key === '5') { e.preventDefault(); if(!G.hasRolled) { if(G.currentPlayer === 1 && !document.getElementById('p1-roll-btn').disabled) rollGavvalu(1); else if(G.currentPlayer === 2 && !document.getElementById('p2-roll-btn').disabled) rollGavvalu(2); } }
          else if(e.code === 'Digit0' || e.key === '0') { e.preventDefault(); if(G.hasRolled && selMovIdx > -1 && curMovEls[selMovIdx]) curMovEls[selMovIdx].click(); }
          else if(G.hasRolled && curMovEls.length > 1) {
            if(['ArrowRight','ArrowDown','Numpad6','Numpad2'].includes(e.code)) { e.preventDefault(); selMovIdx = (selMovIdx + 1) % curMovEls.length; updKeySel(); }
            else if(['ArrowLeft','ArrowUp','Numpad4','Numpad8'].includes(e.code)) { e.preventDefault(); selMovIdx = (selMovIdx - 1 + curMovEls.length) % curMovEls.length; updKeySel(); }
          }
        });

        // Initialize from auto-save if present
        const saved = localStorage.getItem('shellkoin_mobile');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                Object.assign(G, parsed.G);
                document.getElementById('start-screen').style.display = 'none';
                
                updateStrikeDisplay();
                updateBoard();
                if (G.gameStarted && !G.isGameOver) { resetRoll(); }
            } catch(e){}
        } else {
            updateStrikeDisplay();
            updateBoard();
        }
    </script>
</body>
</html>

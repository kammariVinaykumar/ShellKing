<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShellKoin 7x7 — Ultimate PC & Mobile Game</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Telugu&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --board-bg: #6b3a1f; --board-border: #3d1f08; --cell-white: #fdf8f0; --cell-yellow: #fef3c7;
    --cell-orange: #fed7aa; --cell-safe: #bbf7d0; --cell-center: #fbbf24; --red: #ef4444;
    --blue: #3b82f6; --gold: #f59e0b; --panel-card: #2d1a0a; --panel-border: #4a2a10;
    --text-light: #fef3e2; --text-muted: #c9a87c; --cell-size: 56px; --gap: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Baloo 2', sans-serif; background: radial-gradient(ellipse at top, #2d1a08 0%, #0f0804 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 12px 32px; color: var(--text-light); user-select: none; overflow-x: auto; }
  
  .game-title { font-family: 'Tiro Telugu', serif; font-size: 36px; color: var(--gold); letter-spacing: 2px; text-shadow: 0 0 30px rgba(245,158,11,0.5); margin-bottom: 4px; text-align: center; }
  .game-subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
  
  /* Board Fix: Horizontal scroll enabled for mobile */
  .game-wrap { display: flex; flex-direction: row; gap: 24px; align-items: flex-start; justify-content: center; width: 100%; max-width: 1200px; }
  .board-wrap { position: relative; flex-shrink: 0; overflow: auto; padding: 10px; }
  .board { display: grid; grid-template-columns: repeat(7, var(--cell-size)); grid-template-rows: repeat(7, var(--cell-size)); gap: var(--gap); background: var(--board-bg); padding: 10px; border-radius: 16px; border: 3px solid var(--board-border); box-shadow: 0 0 0 1px #8b5a2b, 0 20px 60px rgba(0,0,0,0.8); }

  .player-panel { display: flex; flex-direction: column; gap: 12px; width: 280px; background: var(--panel-card); border: 1px solid var(--panel-border); border-radius: 14px; padding: 14px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); flex-shrink: 0; }

  .cell { background: var(--cell-white); border-radius: 6px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid rgba(139,90,43,0.25); }
  
  /* High Visibility Selection Highlight */
  .token { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; position: relative; transition: all 0.2s ease; }
  .token.key-selected { 
    outline: 4px solid #ffffff !important; 
    outline-offset: 3px; 
    box-shadow: 0 0 20px 5px #ffffff, 0 0 40px #ef4444 !important; 
    transform: scale(1.3) !important; 
    z-index: 100;
  }
  
  .p1-token { background: radial-gradient(circle at 35% 35%, #f87171, #b91c1c); }
  .p2-token { background: radial-gradient(circle at 35% 35%, #60a5fa, #1d4ed8); }

  /* Responsive Adjustments */
  @media (max-width: 800px) {
    :root { --cell-size: 40px; }
    .game-wrap { flex-direction: column; align-items: center; }
    .board-wrap { width: 100%; display: flex; justify-content: center; }
  }
</style>
</head>
<body>

<h1 class="game-title">ShellKoin 7x7</h1>
<div class="game-wrap">
  <div class="player-panel" id="p1-panel">...</div>

  <div class="board-wrap">
    <div class="board" id="game-board"></div>
  </div>

  <div class="player-panel" id="p2-panel">...</div>
</div>

<script>
// మీ పాత లాజిక్ ఇక్కడ కొనసాగించండి...
// ముఖ్యంగా: updKeySel ఫంక్షన్‌లో token కి 'key-selected' క్లాస్ యాడ్ అవుతున్నట్లు చూసుకోండి.
function updKeySel(){ 
    curMovEls.forEach((e,i) => {
        if(i === selMovIdx) e.classList.add('key-selected');
        else e.classList.remove('key-selected');
    }); 
}
</script>
</body>
</html>
